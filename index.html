<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>경품 이벤트</title>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

:root{
  --gold:#FFD700;
  --gold2:#FFA500;
  --bg:#0f0f14;
  --card:#1c1c26;
  --border:#2f2f42;
  --text:#ffffff;
  --muted:#9a9ab0;
  --win:#00e676;
  --lose:#ff5252;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Noto Sans KR', sans-serif;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.container{
  width:100%;
  max-width:420px;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:24px;
  padding:40px 30px;
  text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,.45);
}

.badge{
  display:inline-block;
  padding:6px 14px;
  border-radius:30px;
  background:rgba(255,215,0,.08);
  border:1px solid rgba(255,215,0,.2);
  color:var(--gold);
  font-size:12px;
  margin-bottom:18px;
}

.title{
  font-family:'Black Han Sans', sans-serif;
  font-size:42px;
  line-height:1.2;
  margin-bottom:10px;
  background:linear-gradient(135deg,#FFD700,#FFA500);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.sub{
  color:var(--muted);
  font-size:14px;
  margin-bottom:35px;
}

.inputs{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-bottom:28px;
}

.digit{
  width:64px;
  height:74px;
  border-radius:14px;
  border:2px solid var(--border);
  background:#111118;
  color:var(--gold);
  text-align:center;
  font-size:34px;
  font-family:'Black Han Sans', sans-serif;
  outline:none;
  transition:.2s;
}

.digit:focus{
  border-color:var(--gold);
  box-shadow:0 0 0 4px rgba(255,215,0,.12);
}

button{
  width:100%;
  height:54px;
  border:none;
  border-radius:14px;
  background:linear-gradient(135deg,#FFD700,#FFA500);
  color:#000;
  font-family:'Black Han Sans', sans-serif;
  font-size:18px;
  cursor:pointer;
  transition:.2s;
}

button:hover{
  transform:translateY(-2px);
}

button:disabled{
  opacity:.5;
  cursor:not-allowed;
  transform:none;
}

.result{
  margin-top:28px;
  font-size:22px;
  font-weight:700;
  min-height:30px;
}

.win{
  color:var(--win);
}

.lose{
  color:var(--lose);
}

.info{
  margin-top:16px;
  font-size:13px;
  color:var(--muted);
}

.loading{
  color:var(--gold);
}

@media(max-width:480px){

  .card{
    padding:32px 22px;
  }

  .digit{
    width:58px;
    height:68px;
    font-size:30px;
  }

  .title{
    font-size:34px;
  }
}
</style>
</head>
<body>

<div class="container">
  <div class="card">

    <div class="badge">🎁 Lucky Draw Event</div>

    <div class="title">경품 이벤트</div>

    <div class="sub">
      4자리 코드를 입력하고<br>
      당첨 여부를 확인하세요
    </div>

    <div class="inputs">
      <input maxlength="1" class="digit" />
      <input maxlength="1" class="digit" />
      <input maxlength="1" class="digit" />
      <input maxlength="1" class="digit" />
    </div>

    <button id="checkBtn" onclick="checkCode()">
      당첨 확인하기
    </button>

    <div class="result" id="result"></div>

    <div class="info">
      이미 사용된 코드는 재사용할 수 없습니다
    </div>

  </div>
</div>

<script>

/* =========================================
   ✅ Supabase 설정
========================================= */

const SUPABASE_URL =
"https://tmuftxqpnohnzjeivcmf.supabase.co";

const SUPABASE_ANON_KEY =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRtdWZ0eHFwbm9obnpqZWl2Y21mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3ODg0NzUsImV4cCI6MjA5NTM2NDQ3NX0.XlWQxt9aOq6LWJqVOoHArhWFctm22scJCJfHNH1v_ck";

const supabaseClient =
supabase.createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY
);

/* =========================================
   ✅ 입력칸 자동 이동
========================================= */

const inputs =
document.querySelectorAll(".digit");

inputs.forEach((input,index)=>{

  input.addEventListener("input",(e)=>{

    e.target.value =
      e.target.value
      .toUpperCase()
      .replace(/[^A-Z0-9]/g,"");

    if(e.target.value && index < 3){
      inputs[index+1].focus();
    }

  });

  input.addEventListener("keydown",(e)=>{

    if(
      e.key === "Backspace" &&
      !input.value &&
      index > 0
    ){
      inputs[index-1].focus();
    }

    if(e.key === "Enter"){
      checkCode();
    }

  });

});

/* =========================================
   ✅ 코드 검사
========================================= */

async function checkCode(){

  const code =
    Array.from(inputs)
    .map(i=>i.value)
    .join("");

  const result =
    document.getElementById("result");

  const btn =
    document.getElementById("checkBtn");

  if(code.length !== 4){

    result.className = "result lose";
    result.innerText =
      "⚠ 4자리 코드를 입력하세요";

    return;
  }

  btn.disabled = true;

  result.className = "result loading";
  result.innerText = "확인 중...";

  try{

    const { data, error } =
      await supabaseClient.rpc(
        "use_code",
        {
          p_code: code
        }
      );

    console.log(data);
    console.log(error);

    if(error){

      console.error(error);

      result.className =
        "result lose";

      result.innerText =
        "⚠ 서버 오류";

      btn.disabled = false;

      return;
    }

    /* =========================
       당첨
    ========================= */

    if(data.status === "win"){

      result.className =
        "result win";

      result.innerText =
        "🎉 당첨입니다!";

    }

    /* =========================
       꽝
    ========================= */

    else if(data.status === "lose"){

      result.className =
        "result lose";

      result.innerText =
        "😢 꽝입니다";

    }

    /* =========================
       이미 사용됨
    ========================= */

    else if(
      data.status === "already_used"
    ){

      result.className =
        "result lose";

      result.innerText =
        "⚠ 이미 사용된 코드";

      btn.disabled = false;

    }

    /* =========================
       유효하지 않음
    ========================= */

    else{

      result.className =
        "result lose";

      result.innerText =
        "❌ 유효하지 않은 코드";

      btn.disabled = false;

    }

  }

  catch(e){

    console.error(e);

    result.className =
      "result lose";

    result.innerText =
      "⚠ 서버 오류";

    btn.disabled = false;

  }

}

/* =========================================
   ✅ URL 파라미터 자동 입력
   ?code=A1B2
========================================= */

const params =
new URLSearchParams(location.search);

const autoCode =
params.get("code");

if(autoCode && autoCode.length === 4){

  autoCode
    .toUpperCase()
    .split("")
    .forEach((char,index)=>{

      if(inputs[index]){
        inputs[index].value = char;
      }

    });

}

</script>

</body>
</html>
