<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>경품 이벤트</title>

<!-- Supabase v2 UMD -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.106.0/dist/umd/supabase.js"></script>

<style>
body{
  font-family: Arial, sans-serif;
  background:#111;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.card{
  background:#1c1c1c;
  padding:30px;
  border-radius:15px;
  text-align:center;
  width:320px;
}
input{
  width:50px;
  height:50px;
  font-size:24px;
  text-align:center;
  margin:5px;
}
button{
  margin-top:20px;
  padding:12px;
  width:100%;
  font-size:16px;
  background:gold;
  border:none;
  cursor:pointer;
  border-radius:8px;
}
.result{
  margin-top:20px;
  font-size:20px;
}
</style>
</head>
<body>

<div class="card">
  <h2>🎁 경품 이벤트</h2>
  <p>4자리 코드를 입력하세요</p>

  <div>
    <input maxlength="1" class="digit">
    <input maxlength="1" class="digit">
    <input maxlength="1" class="digit">
    <input maxlength="1" class="digit">
  </div>

  <button onclick="checkCode()">당첨 확인</button>

  <div class="result" id="result"></div>
</div>

<script>
/* ==============================
   ✅ Supabase 연결 설정
================================ */

const SUPABASE_URL = "https://tmuftxqpnohnzjeivcmf.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRtdWZ0eHFwbm9obnpqZWl2Y21mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3ODg0NzUsImV4cCI6MjA5NTM2NDQ3NX0.XlWQxt9aOq6LWJqVOoHArhWFctm22scJCJfHNH1v_ck";

const supabaseClient = supabase.createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY
);

/* ==============================
   ✅ 코드 입력 자동 이동
================================ */

const inputs = document.querySelectorAll(".digit");

inputs.forEach((input, index) => {
  input.addEventListener("input", (e) => {
    e.target.value = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g,"");
    if(e.target.value && index < 3){
      inputs[index+1].focus();
    }
  });

  input.addEventListener("keydown", (e)=>{
    if(e.key==="Backspace" && !input.value && index>0){
      inputs[index-1].focus();
    }
  });
});

/* ==============================
   ✅ 코드 체크 RPC 호출
================================ */

async function checkCode(){

  const code = Array.from(inputs).map(i=>i.value).join("");

  if(code.length !== 4){
    alert("4자리 코드를 입력하세요");
    return;
  }

  document.getElementById("result").innerText = "확인 중...";

  const { data, error } = await supabaseClient.rpc("use_code", {
    p_code: code
  });

  if(error){
    console.error(error);
    document.getElementById("result").innerText = "⚠ 서버 오류";
    return;
  }

  if(data.status === "win"){
    document.getElementById("result").innerText = "🎉 당첨입니다!";
  }
  else if(data.status === "lose"){
    document.getElementById("result").innerText = "😢 꽝입니다.";
  }
  else if(data.status === "already_used"){
    document.getElementById("result").innerText = "⚠ 이미 사용된 코드";
  }
  else{
    document.getElementById("result").innerText = "❌ 유효하지 않은 코드";
  }
}
</script>

</body>
</html>
